<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test API</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      // API服务
      const API_BASE_URL = 'http://localhost:5000/api';

      // 通用请求函数
      async function request(endpoint, options) {
        try {
          console.log(`发送API请求: ${API_BASE_URL}${endpoint}`);
          const response = await fetch(`${API_BASE_URL}${endpoint}`, {
            ...options,
            headers: {
              'Content-Type': 'application/json',
              ...options?.headers,
            },
          });

          if (!response.ok) {
            throw new Error(`API error: ${response.status} ${response.statusText}`);
          }

          const data = await response.json();
          console.log(`API请求成功: ${API_BASE_URL}${endpoint}`, data);
          return data;
        } catch (error) {
          console.error(`API请求失败: ${API_BASE_URL}${endpoint}`, error);
          throw error;
        }
      }

      // 磁盘信息API
      const diskApi = {
        // 获取所有磁盘信息
        getDisks: () => {
          return request('/disk', {
            method: 'GET',
          });
        },
      };

      // 设置API
      const settingsApi = {
        // 获取用户设置
        getSettings: () => {
          return request('/settings', {
            method: 'GET',
          });
        },

        // 保存用户设置
        saveSettings: (settings) => {
          return request('/settings', {
            method: 'POST',
            body: JSON.stringify(settings),
          });
        },
      };

      // 主应用组件
      function App() {
        const [disks, setDisks] = React.useState([]);
        const [settings, setSettings] = React.useState(null);
        const [loading, setLoading] = React.useState(true);
        const [error, setError] = React.useState(null);

        // 加载数据
        React.useEffect(() => {
          const loadData = async () => {
            try {
              setLoading(true);
              const [disksData, settingsData] = await Promise.all([
                diskApi.getDisks(),
                settingsApi.getSettings()
              ]);
              setDisks(disksData);
              setSettings(settingsData);
              setError(null);
            } catch (err) {
              console.error('加载数据失败:', err);
              setError('加载数据失败');
              // 使用模拟数据
              const mockDisks = [
                {
                  letter: 'C:',
                  name: '系统盘',
                  totalSpace: 135000000000,
                  usedSpace: 100000000000,
                  freeSpace: 35000000000,
                  percentage: 74,
                },
                {
                  letter: 'D:',
                  name: '数据盘',
                  totalSpace: 500000000000,
                  usedSpace: 150000000000,
                  freeSpace: 350000000000,
                  percentage: 30,
                },
                {
                  letter: 'E:',
                  name: '娱乐盘',
                  totalSpace: 250000000000,
                  usedSpace: 50000000000,
                  freeSpace: 200000000000,
                  percentage: 20,
                },
              ];
              setDisks(mockDisks);
              setSettings({
                language: 'zh-CN',
                theme: 'light',
                autoStart: false,
                defaultCleanLevel: 'standard',
                historyRetention: 30,
              });
            } finally {
              setLoading(false);
            }
          };

          loadData();
        }, []);

        return (
          <div className="min-h-screen bg-gray-100 p-4">
            <h1 className="text-2xl font-bold mb-4">API测试</h1>
            
            {loading && (
              <div className="mb-4">加载中...</div>
            )}
            
            {error && (
              <div className="mb-4 text-red-500">{error}</div>
            )}
            
            <div className="mb-6">
              <h2 className="text-xl font-bold mb-2">磁盘信息</h2>
              {disks.length > 0 ? (
                <div className="space-y-4">
                  {disks.map((disk) => (
                    <div key={disk.letter} className="bg-white p-4 rounded shadow">
                      <div className="flex justify-between">
                        <span>{disk.letter} {disk.name}</span>
                        <span>{disk.percentage}% 已使用</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-2 mt-2">
                        <div className="bg-blue-500 h-2 rounded-full" style={{ width: `${disk.percentage}%` }}></div>
                      </div>
                    </div>
                  ))}
                </div>
              ) : (
                <div>无磁盘信息</div>
              )}
            </div>
            
            <div>
              <h2 className="text-xl font-bold mb-2">用户设置</h2>
              {settings && (
                <div className="bg-white p-4 rounded shadow">
                  <div className="space-y-2">
                    <div><strong>语言:</strong> {settings.language}</div>
                    <div><strong>主题:</strong> {settings.theme}</div>
                    <div><strong>自动启动:</strong> {settings.autoStart ? '是' : '否'}</div>
                    <div><strong>默认清理级别:</strong> {settings.defaultCleanLevel}</div>
                    <div><strong>历史记录保留:</strong> {settings.historyRetention} 天</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      );
    </script>
  </body>
</html>
