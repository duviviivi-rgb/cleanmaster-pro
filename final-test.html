<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CleanMaster Pro</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.0/dist/tailwind.min.css" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      // 状态类型定义
      const initialState = {
        disks: [
          {
            letter: 'C:',
            name: '系统盘',
            totalSpace: 135000000000,
            usedSpace: 100000000000,
            freeSpace: 35000000000,
            percentage: 74,
          },
          {
            letter: 'D:',
            name: '数据盘',
            totalSpace: 500000000000,
            usedSpace: 150000000000,
            freeSpace: 350000000000,
            percentage: 30,
          },
          {
            letter: 'E:',
            name: '娱乐盘',
            totalSpace: 250000000000,
            usedSpace: 50000000000,
            freeSpace: 200000000000,
            percentage: 20,
          },
        ],
        settings: {
          language: 'zh-CN',
          theme: 'light',
          autoStart: false,
          defaultCleanLevel: 'standard',
          historyRetention: 30,
        },
        loading: {
          disks: false,
          settings: false,
        },
        error: null,
      };

      // Reducer函数
      function appReducer(state, action) {
        switch (action.type) {
          case 'SET_DISKS':
            return {
              ...state,
              disks: action.payload,
              loading: {
                ...state.loading,
                disks: false,
              },
            };
          case 'SET_SETTINGS':
            return {
              ...state,
              settings: action.payload,
              loading: {
                ...state.loading,
                settings: false,
              },
            };
          case 'SET_LOADING':
            return {
              ...state,
              loading: {
                ...state.loading,
                ...action.payload,
              },
            };
          case 'SET_ERROR':
            return {
              ...state,
              error: action.payload,
            };
          case 'SET_THEME':
            return {
              ...state,
              settings: {
                ...state.settings,
                theme: action.payload,
              },
            };
          case 'SET_LANGUAGE':
            return {
              ...state,
              settings: {
                ...state.settings,
                language: action.payload,
              },
            };
          default:
            return state;
        }
      }

      // 磁盘信息组件
      const DiskInfoItem = React.memo(({ disk }) => (
        <div>
          <div className="flex justify-between">
            <span>{disk.letter} {disk.name}</span>
            <span>{disk.percentage}% 已使用</span>
          </div>
          <div className="w-full bg-gray-200 rounded-full h-2">
            <div className="bg-blue-500 h-2 rounded-full" style={{ width: `${disk.percentage}%` }}></div>
          </div>
        </div>
      ));

      // 主应用组件
      function AppContent() {
        const [activeTab, setActiveTab] = React.useState('quick-scan');
        const [state, dispatch] = React.useReducer(appReducer, initialState);

        // 应用主题
        React.useEffect(() => {
          if (state.settings.theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        }, [state.settings.theme]);

        // 切换主题
        const toggleTheme = () => {
          const newTheme = state.settings.theme === 'light' ? 'dark' : 'light';
          dispatch({ type: 'SET_THEME', payload: newTheme });
        };

        // 更改语言
        const changeLanguage = (language) => {
          dispatch({ type: 'SET_LANGUAGE', payload: language });
        };

        return (
          <div className={`min-h-screen ${state.settings.theme === 'dark' ? 'bg-gray-900 text-gray-100' : 'bg-gray-100 text-gray-900'}`}>
            {/* 顶部导航 */}
            <nav className={`p-4 ${state.settings.theme === 'dark' ? 'bg-gray-800 text-white' : 'bg-blue-500 text-white'}`}>
              <div className="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 className="text-xl font-bold">CleanMaster Pro</h1>
                <div className="flex flex-wrap gap-2">
                  <button 
                    className={`px-4 py-2 rounded ${activeTab === 'quick-scan' ? (state.settings.theme === 'dark' ? 'bg-gray-700' : 'bg-blue-600') : (state.settings.theme === 'dark' ? 'hover:bg-gray-700' : 'hover:bg-blue-600')}`}
                    onClick={() => setActiveTab('quick-scan')}
                  >
                    快速扫描
                  </button>
                  <button 
                    className={`px-4 py-2 rounded ${activeTab === 'settings' ? (state.settings.theme === 'dark' ? 'bg-gray-700' : 'bg-blue-600') : (state.settings.theme === 'dark' ? 'hover:bg-gray-700' : 'hover:bg-blue-600')}`}
                    onClick={() => setActiveTab('settings')}
                  >
                    设置
                  </button>
                </div>
              </div>
            </nav>

            {/* 主要内容 */}
            <div className="container mx-auto p-4 flex flex-col md:flex-row gap-4">
              {/* 左侧内容 */}
              <div className={`flex-1 rounded-lg shadow p-4 ${state.settings.theme === 'dark' ? 'bg-gray-800' : 'bg-white'}`}>
                {activeTab === 'quick-scan' && (
                  <div>
                    <h2 className="text-xl font-bold mb-4">快速扫描</h2>
                    <p className="mb-4">扫描C盘，识别可清理的文件类型</p>
                    <div className="mb-4">
                      <h3 className="font-semibold mb-2">扫描内容</h3>
                      <div className="space-y-2">
                        <div className="flex items-center">
                          <input type="checkbox" className="mr-2" defaultChecked />
                          <span>临时文件</span>
                        </div>
                        <div className="flex items-center">
                          <input type="checkbox" className="mr-2" defaultChecked />
                          <span>浏览器缓存</span>
                        </div>
                        <div className="flex items-center">
                          <input type="checkbox" className="mr-2" defaultChecked />
                          <span>系统日志</span>
                        </div>
                        <div className="flex items-center">
                          <input type="checkbox" className="mr-2" defaultChecked />
                          <span>回收站文件</span>
                        </div>
                      </div>
                    </div>
                    <button className="bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-lg font-medium">
                      开始扫描
                    </button>
                  </div>
                )}

                {activeTab === 'settings' && (
                  <div>
                    <h2 className="text-xl font-bold mb-4">设置</h2>
                    <div className="space-y-4">
                      <div>
                        <h3 className="font-semibold mb-2">基本设置</h3>
                        <div className="space-y-2">
                          <div>
                            <label className="block mb-2">语言</label>
                            <select 
                              className="w-full p-2 border rounded" 
                              value={state.settings.language}
                              onChange={(e) => changeLanguage(e.target.value)}
                            >
                              <option value="zh-CN">简体中文</option>
                              <option value="en-US">English</option>
                            </select>
                          </div>
                          <div>
                            <label className="block mb-2">主题</label>
                            <div className="flex space-x-4">
                              <button 
                                className={`px-4 py-2 rounded ${state.settings.theme === 'light' ? 'bg-blue-500 text-white' : 'border'}`}
                                onClick={() => toggleTheme()}
                              >
                                浅色
                              </button>
                              <button 
                                className={`px-4 py-2 rounded ${state.settings.theme === 'dark' ? 'bg-blue-500 text-white' : 'border'}`}
                                onClick={() => toggleTheme()}
                              >
                                深色
                              </button>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>

              {/* 右侧信息栏 */}
              <div className={`w-full md:w-64 rounded-lg shadow p-4 ${state.settings.theme === 'dark' ? 'bg-gray-800' : 'bg-white'}`}>
                <h3 className="font-bold mb-4">磁盘信息</h3>
                <div className="space-y-4">
                  {state.disks.length > 0 ? (
                    state.disks.map((disk) => (
                      <DiskInfoItem key={disk.letter} disk={disk} />
                    ))
                  ) : (
                    <div className="text-center text-gray-500">
                      加载中...
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // 应用入口组件
      function App() {
        return (
          <React.StrictMode>
            <AppContent />
          </React.StrictMode>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(
        <App />
      );
    </script>
  </body>
</html>
