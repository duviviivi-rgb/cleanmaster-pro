<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .test-button { padding: 10px 15px; margin: 5px; background-color: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; }
        .test-button:hover { background-color: #45a049; }
        .result { margin-top: 10px; padding: 10px; background-color: #f5f5f5; border-radius: 3px; white-space: pre-wrap; }
        .error { background-color: #ffe6e6; border-left: 4px solid #ff4d4d; }
        .success { background-color: #e6ffe6; border-left: 4px solid #4dff4d; }
    </style>
</head>
<body>
    <h1>CleanMaster Pro API测试</h1>
    <p>测试后端API是否正常工作</p>
    
    <div class="test-section">
        <h2>测试接口</h2>
        <button class="test-button" onclick="testApi('/test')">测试接口</button>
        <div id="test-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>磁盘信息</h2>
        <button class="test-button" onclick="testApi('/disk')">获取磁盘信息</button>
        <div id="disk-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>用户设置</h2>
        <button class="test-button" onclick="testApi('/settings')">获取设置</button>
        <div id="settings-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>快速扫描</h2>
        <button class="test-button" onclick="testApi('/scan/quick')">快速扫描</button>
        <div id="scan-quick-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>深度扫描</h2>
        <button class="test-button" onclick="testApi('/scan/deep')">深度扫描</button>
        <div id="scan-deep-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>智能分析</h2>
        <button class="test-button" onclick="testApi('/scan/analysis')">智能分析</button>
        <div id="scan-analysis-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>空间使用情况</h2>
        <button class="test-button" onclick="testApi('/space/usage')">空间使用情况</button>
        <div id="space-usage-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>可恢复文件</h2>
        <button class="test-button" onclick="testApi('/recovery/scan')">扫描可恢复文件</button>
        <div id="recovery-scan-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>启动项</h2>
        <button class="test-button" onclick="testApi('/optimization/startup')">获取启动项</button>
        <div id="optimization-startup-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>清理历史</h2>
        <button class="test-button" onclick="testApi('/history')">获取清理历史</button>
        <div id="history-result" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>AI服务</h2>
        <h3>文件分析</h3>
        <button class="test-button" onclick="testApi('/ai/analyze-file')">分析文件</button>
        <div id="ai-analyze-file-result" class="result"></div>
        
        <h3>文件分类</h3>
        <button class="test-button" onclick="testApi('/ai/categorize-files')">分类文件</button>
        <div id="ai-categorize-files-result" class="result"></div>
        
        <h3>文件名生成</h3>
        <button class="test-button" onclick="testApi('/ai/generate-filename')">生成文件名</button>
        <div id="ai-generate-filename-result" class="result"></div>
        
        <h3>清理建议</h3>
        <button class="test-button" onclick="testApi('/ai/cleaning-suggestions')">获取清理建议</button>
        <div id="ai-cleaning-suggestions-result" class="result"></div>
    </div>

                    { "path": "C:\\Temp\\temp2.txt", "size": 2000000, "lastModified": "2026-03-27T15:00:00Z", "type": "临时文件" },

                { "id": "2", "timestamp": "2026-03-28T15:00:00Z", "disk": "C:", "cleanType": "深度清理", "spaceSaved": 5000000000, "filesDeleted": 200 },
                { "id": "3", "timestamp": "2026-03-27T09:00:00Z", "disk": "D:", "cleanType": "快速清理", "spaceSaved": 1000000000, "filesDeleted": 50 }
            ],
            "ai/analyze-file": "文件类型: .txt, 大小: 1024 bytes, 最后修改时间: 2026-03-29 10:00:00",
            "ai/categorize-files": [
                "C:\\example.txt -> 文档",
                "C:\\image.jpg -> 图片",
                "C:\\video.mp4 -> 视频"
            ],
            "ai/generate-filename": "old_file_optimized.txt",
            "ai/cleaning-suggestions": "建议清理临时文件、浏览器缓存和系统日志文件。"
        };
        
        function testApi(endpoint) {
            // 将端点路径中的斜杠替换为连字符，以匹配元素ID
            const elementId = endpoint.split('?')[0].replace(/^\//, '').replace(/\//g, '-') + '-result';
            const resultElement = document.getElementById(elementId);
            
            if (!resultElement) {
                console.error(`Element not found: ${elementId}`);
                return;
            }
            
            resultElement.innerHTML = '测试中...';
            
            try {
                // 从mock数据中获取对应端点的数据
                // 移除查询参数，只使用路径部分作为键
                const endpointKey = endpoint.split('?')[0].replace(/^\//, ''); // 移除开头的斜杠和查询参数
                const data = mockData[endpointKey];
                
                if (data === undefined) {
                    throw new Error(`API endpoint not found: ${endpoint}`);
                }
                
                resultElement.innerHTML = JSON.stringify(data, null, 2);
                resultElement.className = 'result success';
            } catch (error) {
                resultElement.innerHTML = `错误: ${error.message}`;
                resultElement.className = 'result error';
            }
        }
    </script>
</body>
</html>
